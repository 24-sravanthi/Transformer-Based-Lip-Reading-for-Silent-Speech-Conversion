<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0d0b26;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#16113a;stop-opacity:1" />
        </linearGradient>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Professional Dark Background -->
    <rect width="100%" height="100%" fill="url(#mainGrad)"/>

    <!-- Subtle Abstract Data Waves -->
    <g opacity="0.15">
        <path d="M0 225 Q 200 150 400 225 T 800 225" fill="none" stroke="#4facfe" stroke-width="1">
            <animate attributeName="d" values="M0 225 Q 200 150 400 225 T 800 225; M0 225 Q 200 300 400 225 T 800 225; M0 225 Q 200 150 400 225 T 800 225" dur="10s" repeatCount="indefinite" />
        </path>
        <path d="M0 225 Q 200 300 400 225 T 800 225" fill="none" stroke="#00f2fe" stroke-width="1">
            <animate attributeName="d" values="M0 225 Q 200 300 400 225 T 800 225; M0 225 Q 200 150 400 225 T 800 225; M0 225 Q 200 300 400 225 T 800 225" dur="8s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Central Neural/Voice Interface -->
    <g transform="translate(400, 225)">
        <!-- Outer Glowing Ring -->
        <circle r="120" fill="none" stroke="rgba(79, 172, 254, 0.1)" stroke-width="1" />
        <circle r="100" fill="none" stroke="rgba(79, 172, 254, 0.2)" stroke-width="2" stroke-dasharray="5,15" />
        
        <!-- Animated Voice Bars (Minimalist & Professional) -->
        <g filter="url(#softGlow)">
            <rect x="-60" y="-5" width="4" height="10" rx="2" fill="#4facfe">
                <animate attributeName="height" values="10;40;10" dur="1.2s" repeatCount="indefinite" />
                <animate attributeName="y" values="-5;-20;-5" dur="1.2s" repeatCount="indefinite" />
            </rect>
            <rect x="-40" y="-15" width="4" height="30" rx="2" fill="#00f2fe">
                <animate attributeName="height" values="30;70;30" dur="0.8s" repeatCount="indefinite" />
                <animate attributeName="y" values="-15;-35;-15" dur="0.8s" repeatCount="indefinite" />
            </rect>
            <rect x="-20" y="-25" width="4" height="50" rx="2" fill="#4facfe">
                <animate attributeName="height" values="50;90;50" dur="1.5s" repeatCount="indefinite" />
                <animate attributeName="y" values="-25;-45;-25" dur="1.5s" repeatCount="indefinite" />
            </rect>
            <rect x="0" y="-35" width="4" height="70" rx="2" fill="#00f2fe">
                <animate attributeName="height" values="70;110;70" dur="1s" repeatCount="indefinite" />
                <animate attributeName="y" values="-35;-55;-35" dur="1s" repeatCount="indefinite" />
            </rect>
            <rect x="20" y="-25" width="4" height="50" rx="2" fill="#4facfe">
                <animate attributeName="height" values="50;90;50" dur="1.3s" repeatCount="indefinite" />
                <animate attributeName="y" values="-25;-45;-25" dur="1.3s" repeatCount="indefinite" />
            </rect>
            <rect x="40" y="-15" width="4" height="30" rx="2" fill="#00f2fe">
                <animate attributeName="height" values="30;70;30" dur="0.9s" repeatCount="indefinite" />
                <animate attributeName="y" values="-15;-35;-15" dur="0.9s" repeatCount="indefinite" />
            </rect>
            <rect x="60" y="-5" width="4" height="10" rx="2" fill="#4facfe">
                <animate attributeName="height" values="10;40;10" dur="1.1s" repeatCount="indefinite" />
                <animate attributeName="y" values="-5;-20;-5" dur="1.1s" repeatCount="indefinite" />
            </rect>
        </g>

        <!-- Minimalist Lip Symbol -->
        <path d="M -40 40 Q 0 60 40 40 Q 0 50 -40 40" fill="#00f2fe" opacity="0.6">
            <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Modern Corner Accents -->
    <path d="M 20 20 L 60 20 M 20 20 L 20 60" fill="none" stroke="#4facfe" stroke-width="2" opacity="0.5" />
    <path d="M 740 390 L 780 390 M 780 390 L 780 430" fill="none" stroke="#4facfe" stroke-width="2" opacity="0.5" />
</svg>
