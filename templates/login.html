<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lip Reading - Admin Portal</title>
    <link rel="stylesheet" href="/static/style.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="page-container">
        <div class="top-title">Transformer-Based Lip Reading For Silent Speech Conversion</div>
        
        <div class="main-content">
            <h1 class="main-heading">Welcome Back</h1>
            
            <div class="glass-card">
                <form method="POST">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Email" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    
                    <button type="submit" class="primary-btn">
                        Login <i class="fas fa-sign-in-alt"></i>
                    </button>
                    
                    <div style="margin-top: 20px; text-align: center;">
                        <a href="/" style="font-size: 14px; color: var(--secondary); text-decoration: none;">
                            <i class="fas fa-chevron-left"></i> Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="bottom-text">
            <!-- Footer removed -->
        </div>
    </div>
</body>
</html>
